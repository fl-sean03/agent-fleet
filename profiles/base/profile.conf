# base profile — inherited by EVERY workspace. A named profile (client/lab/...) and then the
# workspace descriptor layer on top; most-specific wins. For SKILLS the most-specific declaration
# wins outright (a narrow profile NARROWS — it does not inherit 'all').
#
# base/settings.json carries the UNATTENDED-OPERATION CONTRACT, and it is not decoration: a composed
# config dir REPLACES the account dir's settings, so anything the fleet needs must be re-stated here.
# Dropping skipDangerousModePermissionPrompt strands every agent on the bypass-permissions modal at
# launch — input blocked, with nobody there to answer (caught on a live migration, 2026-07-15).
# cleanupPeriodDays is the transcript-retention floor session-guard exists to protect.
# Deliberately NOT here: `model` — the descriptor's MODEL= pin is the durable source of truth, and a
# settings-level model is how one config-dir edit silently re-pins a whole fleet.
KIND=project              # project | confined
SANDBOX=                  # empty | bwrap
MODEL=claude-opus-4-8
REMOTE_CONTROL=on
SKILLS=all                # 'all' | space-separated skill names (the subset this layer grants)
