# base profile — inherited by EVERY workspace. A named profile (client/lab/...) and then the
# workspace descriptor layer on top; most-specific wins. Keys are harness-neutral policy:
KIND=project              # project | confined
SANDBOX=                  # empty | bwrap
MODEL=claude-opus-4-8
REMOTE_CONTROL=on
SKILLS=all                # 'all' | space-separated skill names (the subset this layer grants)
