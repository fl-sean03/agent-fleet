# client — confined workspace for someone else's work. Isolated by a bwrap namespace; own creds.
KIND=confined
SANDBOX=bwrap
MODEL=claude-opus-4-8
REMOTE_CONTROL=on
# Deliberately NARROW, and methodology-only. Two rules for anything added here:
#   1. it must be useful INSIDE a namespace with no host access (a fleet-operations skill is not —
#      there is no agentctl in there to run);
#   2. it must carry no host, fleet, or other-engagement detail — skills are COPIED into the sandbox,
#      so a skill's text is a disclosure to whoever this workspace belongs to.
SKILLS=investigation-tree loop-engineering
