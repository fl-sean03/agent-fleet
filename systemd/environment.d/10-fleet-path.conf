# Put ~/.local/bin (where nvm symlinks `node`, and the fleet's own tools live) on PATH for ALL
# systemd --user units — including the transient units Claude Code spawns for the Remote-Control
# bridge / Stop hooks. Without this, those hooks run under systemd's bare default PATH and fail with
# "node: not found" (2026-07-17; the same class as the earlier claude/agentctl not-found fixes, but
# at the --user manager layer so it reaches transient units no wrapper controls). ${HOME} keeps it
# portable; node is reached via the stable ~/.local/bin symlink, not a version-pinned nvm dir.
PATH=${HOME}/.local/bin:${HOME}/bin:${PATH}
